name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Find Python source dirs
        id: pydirs
        run: |
          dirs=""
          for d in libs/ services/; do
            if find "$d" -name '*.py' -print -quit | grep -q .; then
              dirs="$dirs $d"
            fi
          done
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

      - name: Lint
        if: steps.pydirs.outputs.dirs != ''
        run: uv run ruff check ${{ steps.pydirs.outputs.dirs }}

      - name: Format check
        if: steps.pydirs.outputs.dirs != ''
        run: uv run ruff format --check ${{ steps.pydirs.outputs.dirs }}

      - name: Type check
        if: steps.pydirs.outputs.dirs != ''
        run: uv run mypy ${{ steps.pydirs.outputs.dirs }}

      - name: Run tests with coverage
        run: uv run pytest

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
